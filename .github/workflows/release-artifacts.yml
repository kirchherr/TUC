name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build-attested-artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src/tuc
      - name: Pytest
        run: pytest -q
      - name: Build distributions
        run: python -m build
      - name: Verify wheel import
        run: |
          unset PYTHONPATH
          wheel_path="$(ls "${GITHUB_WORKSPACE}"/dist/*.whl)"
          python -m venv /tmp/tuc-release-check
          cd /tmp
          /tmp/tuc-release-check/bin/python -m pip install "${wheel_path}"
          /tmp/tuc-release-check/bin/python -c "import importlib.metadata; import tuc; print(importlib.metadata.version('tuc'))"
      - name: Generate CycloneDX SBOM
        run: python scripts/generate_sbom.py --output dist/tuc.cdx.json
      - name: Write SHA-256 checksums
        run: python scripts/write_artifact_checksums.py dist --output dist/SHA256SUMS
      - name: Attest distribution provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          sbom-path: dist/tuc.cdx.json
      - name: Upload release artifact bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tuc-release-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.cdx.json
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
