name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src/tuc
      - name: Pytest
        run: pytest -q
      - name: Example
        run: python examples/phase0_vertical_slice.py
      - name: Phase 1 pipeline example
        run: python examples/phase1_ir_pipeline.py
      - name: Data movement IR example
        run: python examples/data_movement_ir.py
      - name: Triton metadata adapter example
        run: python examples/triton_metadata_adapter.py
      - name: Backend API example
        run: python examples/backend_api_v0.py
      - name: Runtime evidence gate
        run: python examples/runtime_evidence_gate.py
      - name: Runtime candidate score evidence
        run: python examples/runtime_candidate_score_evidence.py
      - name: Runtime candidate scoring gate
        run: python examples/runtime_candidate_scoring_gate.py
      - name: Backend author evidence gate
        run: python examples/backend_author_evidence_gate.py
      - name: Baseline benchmark smoke test
        run: python scripts/benchmark.py --iterations 1 --warmup 0
