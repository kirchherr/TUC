name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src/tuc
      - name: Pytest
        run: pytest -q
      - name: Example
        run: python examples/phase0_vertical_slice.py
      - name: Phase 1 pipeline example
        run: python examples/phase1_ir_pipeline.py
      - name: Data movement IR example
        run: python examples/data_movement_ir.py
