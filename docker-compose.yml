name: tuc

x-dev-base: &dev-base
  build:
    context: .
    dockerfile: docker/dev/Dockerfile
    args:
      PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
      INSTALL_TORCH: ${INSTALL_TORCH:-1}
  image: tuc-dev:latest
  working_dir: /workspace
  volumes:
    - .:/workspace
  environment: &dev-env
    TUC_IN_CONTAINER: "1"
    PYTHONPATH: /workspace/src
    CC: clang-18
    CXX: clang++-18
    LLVM_CONFIG: /usr/bin/llvm-config-18
    LLVM_DIR: /usr/lib/llvm-18/lib/cmake/llvm
    MLIR_DIR: /usr/lib/llvm-18/lib/cmake/mlir
  stdin_open: true
  tty: true

services:
  dev:
    <<: *dev-base
    command: bash

  gpu:
    <<: *dev-base
    profiles:
      - gpu
    gpus: all
    environment:
      <<: *dev-env
      TUC_ENABLE_GPU: "1"
    command: bash
